# configs/shapenet_seg.yaml — ShapeNetPart part segmentation
# Batch 3 target: 86.0 – 86.8 Instance mIoU (competitive with SPM / MambaTron)

# ── Dataset ────────────────────────────────────────────────────────────
dataset: shapenet
data_dir: data/shapenet_part_seg_hdf5_data
num_points: 2048
num_classes: 50
num_categories: 16
use_category: true

# ── Slicing — Coarse (drives the ASP loop) ─────────────────────────────
num_slices: 16
points_per_slice: 128
geo_dim: 8

# ── B4: Slicing — Fine (per-point local features only) ─────────────────
# The fine level is NOT visited by the ASP loop. It only produces
# per-slice tokens whose features are propagated to each point via A1's
# inverse-distance interpolation, then concatenated to the coarse per-point
# features in the seg head. Cost is bounded because we do one encoder pass
# and no ASP loop over fine slices.
use_multiscale: true
num_slices_fine: 64
points_per_slice_fine: 32
fine_feat_dim: 128
fine_k_edge: 8

# ── Model — Coarse ─────────────────────────────────────────────────────
feat_dim: 512
k_edge: 20
transformer_heads: 4
transformer_ffn_dim: 1024
hidden_dim: 512
num_lif_layers: 3
lif_leak: 0.9
lif_threshold: 1.0
d_ssp: 128
T: 6
point_feat_dim: 64

# ── Encoder type (kept analog through Batch 3; Batch 4 will spike this) ─
encoder_type: analog
encoder_T: 4
encoder_lif_leak: 0.9
encoder_lif_threshold: 1.0

# ── SSP ablation ───────────────────────────────────────────────────────
ssp_mode: learned

# ── A3 (Batch 1): Category-conditional SSP ─────────────────────────────
cat_emb_dim: 8

# ── Tier-1 SNN training best practices ─────────────────────────────────
lif_learnable: true
lif_use_mpbn: true

# ── A0 (Batch 2): Dense TET loss ───────────────────────────────────────
loss_mode: dense_tet
tet_lambda: 0.05

# ── A1 (Batch 2): Soft feature propagation ─────────────────────────────
use_soft_fp: true
fp_k: 3
fp_epsilon: 1e-8

# ── B1 (Batch 3): Boundary-Aware ASP ───────────────────────────────────
# When true, a small BoundaryHead predicts b(p) ∈ [0,1] per point (BCE
# supervised via bnd_labels from the dataset). The SSP receives per-slice
# mean boundary scores and adds a learned bias to its selection scores,
# tilting the ASP loop toward slices with many boundary points.
#
# The SSP's boundary_weight is zero-initialised so this is a NO-OP at t=0
# — training gradually grows the bias if predicted boundaries help seg loss.
#
# When false: no boundary head, no bias term, SSP behaves as in Batch 2.
use_boundary_aware: true
boundary_hidden: 128       # BoundaryHead width (~70K params)
bnd_k: 10                  # k-NN size for computing ground-truth boundary labels
bnd_loss_weight: 0.1       # weight of BCE loss in total loss

# ── Training ───────────────────────────────────────────────────────────
epochs: 300
batch_size: 32
lr: 3e-4
encoder_lr_scale: 0.1
weight_decay: 0.01
grad_clip: 1.0
warmup_epochs: 10
use_amp: true

# ── Gumbel temperature ─────────────────────────────────────────────────
tau_start: 1.0
tau_end: 0.1
tau_decay: 0.95

# ── A4 (Batch 1): Segmentation augmentation ────────────────────────────
aug_rotate_z: true
aug_rotate_so3: false
aug_so3_tilt: 0.26

aug_scale_lo: 0.66
aug_scale_hi: 1.5

aug_translate: 0.1

aug_jitter_sigma: 0.005
aug_jitter_clip: 0.02

aug_flip_x: true
aug_flip_y: true
aug_flip_z: false

# ── Logging ────────────────────────────────────────────────────────────
eval_interval: 5
log_dir: logs
ckpt_dir: checkpoints
seed: 42
num_workers: 8