# configs/shapenet_seg.yaml — ShapeNetPart part segmentation
# Batch 4 target: 85.5 – 86.5 Ins mIoU with system-level α starting to move.
# Roadmap goal (all batches): 86.0 – 86.8 Ins mIoU with α ≥ 5x.

# ── Dataset ────────────────────────────────────────────────────────────
dataset: shapenet
data_dir: data/shapenet_part_seg_hdf5_data
num_points: 2048
num_classes: 50
num_categories: 16
use_category: true

# ── Slicing — Coarse ───────────────────────────────────────────────────
num_slices: 16
points_per_slice: 128
geo_dim: 8

# ── B4: Slicing — Fine ─────────────────────────────────────────────────
use_multiscale: true
num_slices_fine: 64
points_per_slice_fine: 32
fine_feat_dim: 128
fine_k_edge: 8

# ── Model — Coarse ─────────────────────────────────────────────────────
feat_dim: 512
k_edge: 20
transformer_heads: 4
transformer_ffn_dim: 1024
hidden_dim: 512
num_lif_layers: 3
lif_leak: 0.9
lif_threshold: 1.0
d_ssp: 128
T: 6
point_feat_dim: 64

# ── Encoder type (kept analog until final batch) ───────────────────────
encoder_type: analog
encoder_T: 4
encoder_lif_leak: 0.9
encoder_lif_threshold: 1.0

# ── B2 (Batch 4): Segmentation head type ───────────────────────────────
# 'spiking' (new default) — SpikingSegmentationHead (Batch 4). Three LIF
#            cells run for T=seg_head_T timesteps with static-input encoding.
#            Spike-only inter-layer communication. Final analog classifier
#            reads out the average membrane of the last cell. This is the
#            change that lets system α actually move for segmentation.
# 'analog'  — original Batch 3 seg head (Linear+BN+ReLU). Ablation only.
seg_head_type: spiking
seg_head_T: 2                    # 2 timesteps is the sweet spot for accuracy/energy
seg_head_lif_leak: 0.9
seg_head_lif_threshold: 1.0

# ── SSP ablation ───────────────────────────────────────────────────────
ssp_mode: learned

# ── A3 (Batch 1): Category-conditional SSP ─────────────────────────────
cat_emb_dim: 8

# ── Tier-1 SNN training best practices ─────────────────────────────────
lif_learnable: true
lif_use_mpbn: true

# ── A0 (Batch 2): Dense TET loss ───────────────────────────────────────
loss_mode: dense_tet
tet_lambda: 0.05

# ── A1 (Batch 2): Soft feature propagation ─────────────────────────────
use_soft_fp: true
fp_k: 3
fp_epsilon: 1e-8

# ── B1 (Batch 3): Boundary-Aware ASP ───────────────────────────────────
use_boundary_aware: true
boundary_hidden: 128
bnd_k: 10
bnd_loss_weight: 0.1

# ── Training ───────────────────────────────────────────────────────────
# NOTE for Batch 4: with spiking seg head + dense TET, the head runs
# T * seg_head_T = 12 spiking forward passes per training step. This
# raises per-step wall-clock by ~1.2x relative to Batch 3. Total training
# time is still bounded, but consider raising warmup to 15 epochs so the
# spiking head has time to settle before cosine decay bites in.
epochs: 300
batch_size: 32
lr: 3e-4
encoder_lr_scale: 0.1
weight_decay: 0.01
grad_clip: 1.0
warmup_epochs: 15                # 10 → 15 (spiking head warm-up)
use_amp: true

# ── Gumbel temperature ─────────────────────────────────────────────────
tau_start: 1.0
tau_end: 0.1
tau_decay: 0.95

# ── A4 (Batch 1): Segmentation augmentation ────────────────────────────
aug_rotate_z: true
aug_rotate_so3: false
aug_so3_tilt: 0.26

aug_scale_lo: 0.66
aug_scale_hi: 1.5

aug_translate: 0.1

aug_jitter_sigma: 0.005
aug_jitter_clip: 0.02

aug_flip_x: true
aug_flip_y: true
aug_flip_z: false

# ── Logging ────────────────────────────────────────────────────────────
eval_interval: 5
log_dir: logs
ckpt_dir: checkpoints
seed: 42
num_workers: 8