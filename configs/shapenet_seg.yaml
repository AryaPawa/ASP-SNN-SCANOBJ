# configs/shapenet_seg.yaml — ShapeNetPart part segmentation
# Batch 2 target: 85.5 – 86.5 Instance mIoU
# Roadmap goal (through all batches): 86.0 – 86.8 Instance mIoU

# ── Dataset ────────────────────────────────────────────────────────────
dataset: shapenet
data_dir: data/shapenet_part_seg_hdf5_data
num_points: 2048
num_classes: 50
num_categories: 16
use_category: true

# ── Slicing ────────────────────────────────────────────────────────────
num_slices: 16
points_per_slice: 128
geo_dim: 8

# ── Model ──────────────────────────────────────────────────────────────
feat_dim: 512
k_edge: 20
transformer_heads: 4
transformer_ffn_dim: 1024
hidden_dim: 512
num_lif_layers: 3
lif_leak: 0.9
lif_threshold: 1.0
d_ssp: 128
T: 6
point_feat_dim: 64

# ── Encoder type (kept analog for Batch 2; Batch 3 will spike this) ────
encoder_type: analog
encoder_T: 4
encoder_lif_leak: 0.9
encoder_lif_threshold: 1.0

# ── SSP ablation ───────────────────────────────────────────────────────
ssp_mode: learned

# ── A3 (Batch 1): Category-conditional SSP ─────────────────────────────
cat_emb_dim: 8

# ── Tier-1 SNN training best practices ─────────────────────────────────
lif_learnable: true
lif_use_mpbn: true

# ── A0 (Batch 2): Dense TET loss ───────────────────────────────────────
# 'ce'         : single CE on final logits (backward-compat / Batch 1)
# 'dense_tet'  : mean per-timestep per-point CE with equal weighting.
#                Forces the seg head + belief pathway to be discriminative
#                at every ASP timestep. Ref: Deng et al. TET ICLR 2022.
#                Cost: seg head runs T times during training only. Eval is
#                a single forward pass (no per-timestep cost).
loss_mode: dense_tet

# Optional MSE regularizer pulling each intermediate timestep's logits
# toward the final-step logits. Small value stabilizes training. Set 0 to
# disable. In classifier this was 0.05 (same value shown to work).
tet_lambda: 0.05

# ── A1 (Batch 2): Soft feature propagation ─────────────────────────────
# When true, per-point local features are computed as an inverse-distance
# weighted mixture of the fp_k nearest slice anchor features (PointNet++
# style). This fixes the "all ~128 points in a slice share one 512-d
# vector" resolution collapse. When false, falls back to hard slice
# lookup (matches Batch 1 behaviour) — useful for A/B ablation.
use_soft_fp: true
fp_k: 3            # 3 nearest anchors is standard for PointNet++ F.P.
fp_epsilon: 1e-8   # numerical stability for 1/distance

# ── Training ───────────────────────────────────────────────────────────
epochs: 300
batch_size: 32
lr: 3e-4
encoder_lr_scale: 0.1
weight_decay: 0.01
grad_clip: 1.0
warmup_epochs: 10
use_amp: true

# ── Gumbel temperature ─────────────────────────────────────────────────
tau_start: 1.0
tau_end: 0.1
tau_decay: 0.95

# ── A4 (Batch 1): Segmentation augmentation ────────────────────────────
aug_rotate_z: true
aug_rotate_so3: false
aug_so3_tilt: 0.26

aug_scale_lo: 0.66
aug_scale_hi: 1.5

aug_translate: 0.1

aug_jitter_sigma: 0.005
aug_jitter_clip: 0.02

aug_flip_x: true
aug_flip_y: true
aug_flip_z: false

# Still off pending dataset-loader integration (see Batch 1 note)
aug_resample: false

aug_slice_dropout: 0.1

# ── Logging ────────────────────────────────────────────────────────────
eval_interval: 5
log_dir: logs
ckpt_dir: checkpoints
seed: 42
num_workers: 8