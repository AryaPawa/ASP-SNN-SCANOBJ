# configs/shapenet_seg.yaml — ShapeNetPart part segmentation
# Batch 1 target: 84.5 – 85.5 Instance mIoU
# Roadmap goal (through all batches): 86.0 – 86.8 Instance mIoU

# ── Dataset ────────────────────────────────────────────────────────────
dataset: shapenet
data_dir: data/shapenet_part_seg_hdf5_data
num_points: 2048
num_classes: 50
num_categories: 16
use_category: true

# ── Slicing ────────────────────────────────────────────────────────────
num_slices: 16
points_per_slice: 128
geo_dim: 8

# ── Model ──────────────────────────────────────────────────────────────
feat_dim: 512
k_edge: 20
transformer_heads: 4
transformer_ffn_dim: 1024
hidden_dim: 512
num_lif_layers: 3
lif_leak: 0.9
lif_threshold: 1.0
d_ssp: 128
T: 6
point_feat_dim: 64

# ── Encoder type (kept analog for Batch 1; Batch 3 will spike this) ────
encoder_type: analog
encoder_T: 4
encoder_lif_leak: 0.9
encoder_lif_threshold: 1.0

# ── SSP ablation ───────────────────────────────────────────────────────
ssp_mode: learned

# ── A3: Category-conditional SSP ───────────────────────────────────────
# Dimension of the learned category embedding fed into SSP. 8 is enough
# for 16 categories. Set num_categories=0 (via use_category: false) to
# disable this branch entirely.
cat_emb_dim: 8

# ── Tier-1 SNN training best practices (from ScanObj wins) ─────────────
# Batch 2 will extend loss_mode to a segmentation-specific dense TET.
loss_mode: aux           # 'aux' for now; Batch 2 introduces 'dense_tet'
lif_learnable: true
lif_use_mpbn: true

# ── Training ───────────────────────────────────────────────────────────
epochs: 300
batch_size: 32
lr: 3e-4
encoder_lr_scale: 0.1
weight_decay: 0.01
grad_clip: 1.0
warmup_epochs: 10
use_amp: true

# ── Gumbel temperature ─────────────────────────────────────────────────
tau_start: 1.0
tau_end: 0.1
tau_decay: 0.95

# ── A4: Segmentation augmentation (stronger than default) ──────────────
# Rotations
aug_rotate_z: true
aug_rotate_so3: false
aug_so3_tilt: 0.26

# A4: wider anisotropic scale range (was 0.8 / 1.25)
aug_scale_lo: 0.66
aug_scale_hi: 1.5

# Translation
aug_translate: 0.1

# A4: tighter jitter defaults for segmentation (was σ=0.01, clip=0.05)
# Rationale: heavy jitter shifts points across part boundaries, corrupting
# labels. Tight jitter still adds useful noise without label drift.
aug_jitter_sigma: 0.005
aug_jitter_clip: 0.02

# A4: random axis mirror (cheap invariance). Keep flip_x, flip_y on; flip_z
# breaks gravity-aligned semantics so leave off for ShapeNet.
aug_flip_x: true
aug_flip_y: true
aug_flip_z: false

# A4: random point resampling with replacement
# NOTE: enabling this REQUIRES the dataset __getitem__ to pass part_labels
# into augment_seg AND to permute sid_arr by the same indices.
# For Batch 1 we leave this OFF by default (opt-in via configs) until the
# dataset integration is committed — see Batch 1 rollout note below.
aug_resample: false

# Per-slice point dropout
aug_slice_dropout: 0.1

# ── Logging ────────────────────────────────────────────────────────────
eval_interval: 5
log_dir: logs
ckpt_dir: checkpoints
seed: 42
num_workers: 8